name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: retain
          POSTGRES_PASSWORD: retain
          POSTGRES_DB: retain_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 3s
          --health-timeout 2s
          --health-retries 5

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: lint
            cmd: uv run ruff check src/retain/ tests/
          - name: typecheck
            cmd: uv run mypy src/retain/ tests/
          - name: unit-tests
            cmd: uv run pytest tests/ -m unit -v
          - name: integration-tests
            cmd: uv run pytest tests/ -m integration -v

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --group dev
      - run: ${{ matrix.cmd }}
    env:
      RETAIN_TEST_DATABASE_URL: postgresql+asyncpg://retain:retain@localhost:5432/retain_test
